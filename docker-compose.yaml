services:
  scylladb:
    image: scylladb/scylla:6.2
    ports:
      - "9043:9042"
    volumes:
      - scylla-data:/var/lib/scylla
    command: --smp 1 --memory 512M --overprovisioned 1
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'DESC KEYSPACES' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  nats:
    image: nats:2.11-alpine
    ports:
      - "4222:4222"
      - "8222:8222"
    command: --jetstream --store_dir /data --http_port 8222
    volumes:
      - nats-data:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  forgejo:
    image: codeberg.org/forgejo/forgejo:11
    ports:
      - "3333:3000"
      - "2222:22"
    volumes:
      - forgejo-data:/data
    environment:
      - FORGEJO__database__DB_TYPE=sqlite3
      - FORGEJO__security__INSTALL_LOCK=true
      - FORGEJO__service__DISABLE_REGISTRATION=true
      - FORGEJO__api__ENABLE_SWAGGER=false
      - FORGEJO__server__ROOT_URL=http://localhost:3000
      - FORGEJO__server__HTTP_PORT=3000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/v1/version"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  scylla-data:
  nats-data:
  forgejo-data:
