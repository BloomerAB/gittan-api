steps:
  - name: install
    image: gittan/node:22
    run: corepack enable && pnpm install --frozen-lockfile
    cache:
      - node_modules

  - name: typecheck
    image: gittan/node:22
    run: corepack enable && pnpm typecheck
    needs: [install]

  - name: test
    image: gittan/node:22
    run: corepack enable && pnpm test
    needs: [install]

  - name: build
    image: gittan/node:22
    run: corepack enable && pnpm build
    needs: [typecheck, test]

gated:
  - main

depends:
  - repo: types
    cascade: true
    contractTest: true

links:
  docs: https://docs.gittan.eu/api
