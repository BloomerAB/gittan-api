steps:
  - name: typecheck
    image: gittan/node:22
    run: pnpm typecheck

  - name: test
    image: gittan/node:22
    run: pnpm test

  - name: build
    image: gittan/node:22
    run: pnpm build
    needs: [typecheck, test]
    cache:
      - node_modules

gated:
  - main

depends:
  - repo: types
    cascade: true
    contractTest: true

links:
  docs: https://docs.gittan.eu/api
